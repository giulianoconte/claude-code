set -g mouse on
set -g history-limit 10000
setw -g mode-keys vi

# NOTE: `mouse on` works with the wezterm setup (wezterm's built-in SSH
# client passes CSI mouse events through). In the alacritty fallback it's
# effectively a no-op because ConPTY strips CSI on ssh.exe's input. Safe
# to keep either way; in the alacritty case use copy-mode to scroll:
# prefix+[ → k/j, PgUp/PgDn, Ctrl+u/Ctrl+d → q to exit.
